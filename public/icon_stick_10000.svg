<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 220" style="background:#1a4a2e">
  <!-- 棒本体 -->
  <rect x="1" y="1" width="28" height="218" rx="6" ry="6" fill="#1a4a2e"/>
  <!-- 白枠なし -->

  <!-- 上寄り: 大きい白丸 -->
  <circle cx="15" cy="65" r="7.5" fill="#fff"/>
  <!-- 下寄り: 大きい白丸 -->
  <circle cx="15" cy="155" r="7.5" fill="#fff"/>
  <!-- ど真ん中: やや小さい白丸 -->
  <circle cx="15" cy="110" r="5.5" fill="#fff"/>

  <!-- 上の正三角形 -->
  <circle cx="10" cy="99" r="3" fill="#fff"/>
  <circle cx="20" cy="99" r="3" fill="#fff"/>
  <circle cx="15" cy="90" r="3" fill="#fff"/>

  <!-- 下の正三角形（反転） -->
  <circle cx="10" cy="121" r="3" fill="#fff"/>
  <circle cx="20" cy="121" r="3" fill="#fff"/>
  <circle cx="15" cy="130" r="3" fill="#fff"/>
</svg>
